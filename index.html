<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enviar Email</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .campo {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: #444;
      margin-bottom: .35rem;
    }

    input, textarea {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color .2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #4f46e5;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      width: 100%;
      padding: .8rem;
      background: #c91414;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      margin-top: .5rem;
    }

    button:hover:not(:disabled) { background: #4338ca; }
    button:disabled { opacity: .6; cursor: not-allowed; }

    .feedback {
      margin-top: 1rem;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .9rem;
      text-align: center;
      display: none;
    }

    .feedback.sucesso {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    .feedback.erro {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fale Conosco</h1>
    <form id="formulario">
      <div class="campo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Seu nome completo" required />
      </div>
      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required />
      </div>
      <div class="campo">
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" placeholder="Escreva sua mensagem..." required></textarea>
      </div>
      <button type="submit" id="btn-enviar">Enviar mensagem</button>
    </form>
    <div class="feedback" id="feedback"></div>
  </div>

  <script>
    const form = document.getElementById("formulario");
    const btn = document.getElementById("btn-enviar");
    const feedback = document.getElementById("feedback");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim();
      const mensagem = document.getElementById("mensagem").value.trim();

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Enviando...';
      feedback.className = "feedback";
      feedback.textContent = "";

      try {
        const resposta = await fetch("/api/enviar-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, email, mensagem }),
        });

        const dados = await resposta.json();

        if (dados.sucesso) {
          feedback.className = "feedback sucesso";
          feedback.textContent = "Mensagem enviada com sucesso!";
          form.reset();
        } else {
          throw new Error(dados.erro || "Erro desconhecido");
        }
      } catch (err) {
        feedback.className = "feedback erro";
        feedback.textContent = "Erro ao enviar: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Enviar mensagem";
      }
    });
  </script>
</body>
</html>
